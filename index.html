<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucy Wachu | Week 5 DOM Manipulation</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- HEADER -->
    <header id="main-header">
        <h1>Portfolio Website</h1>

        <nav>
            <ul class="nav-list">
                <li><a href="#" class="nav-link">Home</a></li>
                <li><a href="#" class="nav-link">About</a></li>
                <li><a href="#" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container">

        <!-- ARTICLE -->
        <article class="content">
            <h2 id="article-title">Article Title</h2>
            <p>This is the first paragraph.</p>
            <p>This is the second paragraph.</p>
        </article>

        <!-- CONTACT FORM -->
        <section id="contact-section">
            <h2>Contact Form</h2>

            <form id="contact-form">
                <input type="text" id="name" placeholder="Name">
                <input type="email" id="email" placeholder="Email">
                <button type="submit">Submit</button>
            </form>
        </section>

        <!-- TO DO LIST -->
        <section id="todo-section">
            <h2>To-Do List</h2>

            <!-- FIXED ID TO MATCH JS -->
            <form id="todo-form">
                <input type="text" id="task-input" placeholder="What needs to be done?">
                <button type="button" id="add-task">Add Task</button>
            </form>

            <div class="filters">
                <button class="filter active" data-filter="all">All</button>
                <button class="filter" data-filter="active">Active</button>
                <button class="filter" data-filter="completed">Completed</button>
            </div>

            <ul id="todo-list"></ul>

            <div class="footer-actions">
                <span id="items-left">0 items left</span>
                <button id="clear-completed">Clear Completed</button>
            </div>
        </section>

        <!-- DAILY CHALLENGES -->
        <section id="challenges">
            <h2>Daily Challenges</h2>

            <button id="color-changer">Random Heading Color</button>
            <button id="add-paragraph">Add Paragraph</button>
            <button id="remove-images">Remove Images</button>

            <div class="image-test">
                <img src="https://placehold.co/150" alt="Test Image">
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 Lucy Wachu</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="dom.js"></script>
    <script src="app.js"></script>

</body>
</html>
